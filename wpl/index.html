<html>

<head>
    <meta charset="utf-8">
    <title>Water Level Monitor</title>

    <link rel="stylesheet" href="css/wpl.css">

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/series-label.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>

    <script src="js/wpl.js"></script>
</head>

<body>
    <h1>Water Level</h1>

    <div id="last-update-status">Loading...</div>
    <div id="refresh-countdown"></div>
    <div id="container"></div>

    <script>
        var chart;
        var countdown;
        var countdownSecs = REFRESH_INTERVAL_MS / 1000;

        var API_URL = "https://fjordoprj.altervista.org/wpl/rest.php/my_fjordoprj/";

        function loadData() {
            fetch(API_URL)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    updateStatus(data);

                    var distanze = parseData(data);

                    if (!chart) {
                        chart = Highcharts.chart('container', {
                            chart: { zoomType: 'x' },
                            title: { text: 'Water distance from sensor' },
                            subtitle: {
                                text: document.ontouchstart === undefined
                                    ? 'Click and drag to zoom'
                                    : 'Pinch to zoom'
                            },
                            xAxis: { type: 'datetime' },
                            yAxis: { title: { text: 'Distance (cm)' } },
                            legend: { enabled: false },
                            plotOptions: {
                                area: {
                                    fillColor: {
                                        linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 },
                                        stops: [
                                            [0, Highcharts.getOptions().colors[0]],
                                            [1, Highcharts.Color(Highcharts.getOptions().colors[0]).setOpacity(0).get('rgba')]
                                        ]
                                    },
                                    marker: { radius: 2 },
                                    lineWidth: 1,
                                    states: { hover: { lineWidth: 1 } },
                                    threshold: null
                                }
                            },
                            series: [{
                                type: 'area',
                                name: 'Distance from sensor (cm)',
                                data: distanze
                            }]
                        });
                    } else {
                        chart.series[0].setData(distanze, true);
                    }
                })
                .catch(function (err) {
                    document.getElementById('last-update-status').textContent =
                        'Error loading data: ' + err.message;
                    document.getElementById('last-update-status').style.color = '#c0392b';
                });

            resetCountdown();
        }

        function resetCountdown() {
            clearInterval(countdown);
            countdownSecs = REFRESH_INTERVAL_MS / 1000;
            updateCountdown();
            countdown = setInterval(function () {
                countdownSecs--;
                updateCountdown();
                if (countdownSecs <= 0) {
                    clearInterval(countdown);
                    loadData();
                }
            }, 1000);
        }

        function updateCountdown() {
            var m = Math.floor(countdownSecs / 60);
            var s = countdownSecs % 60;
            document.getElementById('refresh-countdown').textContent =
                'Next refresh in ' + m + ':' + (s < 10 ? '0' : '') + s;
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>

</html>
