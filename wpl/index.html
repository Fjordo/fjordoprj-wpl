<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Level Monitor</title>

    <link rel="stylesheet" href="css/wpl.css">

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/series-label.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>

    <script src="js/wpl.js"></script>
</head>

<body>
    <h1>Water Level</h1>

    <div id="last-update-status">Loading...</div>
    <div id="refresh-countdown"></div>

    <div id="range-controls">
        <button type="button" class="range-btn" data-range="1m">1 Month</button>
        <button type="button" class="range-btn active" data-range="3m">3 Months</button>
        <button type="button" class="range-btn" data-range="6m">6 Months</button>
        <button type="button" class="range-btn" data-range="1y">1 Year</button>
        <button type="button" class="range-btn" data-range="all">All</button>
    </div>

    <div id="container"></div>

    <script>
        var chart;
        var countdown;
        var countdownSecs = REFRESH_INTERVAL_MS / 1000;
        var currentRange = '3m';

        var API_BASE = "https://fjordoprj.altervista.org/wpl/rest.php/my_fjordoprj/";

        function loadData() {
            fetch(API_BASE + '?range=' + currentRange)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    updateStatus(data);

                    var distanze = parseData(data);

                    var volumi = parseVolumeData(data);

                    if (!chart) {
                        chart = Highcharts.chart('container', {
                            chart: { zoomType: 'x' },
                            title: { text: 'Water Level Monitor' },
                            subtitle: {
                                text: document.ontouchstart === undefined
                                    ? 'Click and drag to zoom'
                                    : 'Pinch to zoom'
                            },
                            xAxis: { type: 'datetime' },
                            yAxis: [
                                { title: { text: 'Distance from sensor (cm)' } },
                                { title: { text: 'Residual volume (dm³)' }, opposite: true, min: 0 }
                            ],
                            legend: { enabled: true },
                            plotOptions: {
                                area: {
                                    fillColor: {
                                        linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 },
                                        stops: [
                                            [0, Highcharts.getOptions().colors[0]],
                                            [1, Highcharts.Color(Highcharts.getOptions().colors[0]).setOpacity(0).get('rgba')]
                                        ]
                                    },
                                    marker: { radius: 2 },
                                    lineWidth: 1,
                                    states: { hover: { lineWidth: 1 } },
                                    threshold: null
                                }
                            },
                            series: [
                                {
                                    type: 'area',
                                    name: 'Distance (cm)',
                                    yAxis: 0,
                                    data: distanze
                                },
                                {
                                    type: 'line',
                                    name: 'Volume (dm³)',
                                    yAxis: 1,
                                    color: Highcharts.getOptions().colors[1],
                                    marker: { radius: 2 },
                                    data: volumi
                                }
                            ]
                        });
                    } else {
                        chart.series[0].setData(distanze, true);
                        chart.series[1].setData(volumi, true);
                    }
                })
                .catch(function (err) {
                    document.getElementById('last-update-status').textContent =
                        'Error loading data: ' + err.message;
                    document.getElementById('last-update-status').style.color = '#c0392b';
                });

            resetCountdown();
        }

        function resetCountdown() {
            clearInterval(countdown);
            countdownSecs = REFRESH_INTERVAL_MS / 1000;
            updateCountdown();
            countdown = setInterval(function () {
                countdownSecs--;
                updateCountdown();
                if (countdownSecs <= 0) {
                    clearInterval(countdown);
                    loadData();
                }
            }, 1000);
        }

        function updateCountdown() {
            var m = Math.floor(countdownSecs / 60);
            var s = countdownSecs % 60;
            document.getElementById('refresh-countdown').textContent =
                'Next refresh in ' + m + ':' + (s < 10 ? '0' : '') + s;
        }

        document.addEventListener('DOMContentLoaded', function () {
            // Wire up range buttons
            document.querySelectorAll('.range-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.range-btn').forEach(function (b) {
                        b.classList.remove('active');
                    });
                    btn.classList.add('active');
                    currentRange = btn.getAttribute('data-range');
                    loadData();
                });
            });

            loadData();
        });
    </script>
</body>

</html>
